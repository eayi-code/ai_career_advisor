version: '3.8'

services:
  app:
    build: .
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/career_advisor
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - FLASK_DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/app.log
    volumes:
      - chroma_data:/app/chroma_data
      - app_logs:/app/logs
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 定时备份服务
  backup:
    build: .
    entrypoint: /bin/sh
    command: >
      -c "
      echo '0 2 * * * cd /app && python scripts/backup.py >> /app/logs/backup.log 2>&1' > /tmp/crontab &&
      echo '0 3 * * 0 find /app/backups -type f -mtime +7 -delete >> /app/logs/cleanup.log 2>&1' >> /tmp/crontab &&
      crontab /tmp/crontab &&
      crond -f -l 8
      "
    volumes:
      - ./scripts:/app/scripts
      - backups:/app/backups
      - app_logs:/app/logs
      - mysql_data:/app/mysql_data:ro
      - chroma_data:/app/chroma_data:ro
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=career_advisor
      - CHROMA_PERSIST_DIR=/app/chroma_data
    depends_on:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=career_advisor
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  chroma_data:
  app_logs:
  backups:
  nginx_logs:
