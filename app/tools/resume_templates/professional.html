<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f6; -webkit-font-smoothing: antialiased; }
        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .print-canvas { box-shadow: none !important; margin: 0 !important; padding: 10mm 15mm !important; width: 100% !important; max-width: 100% !important; }
        }
        .section-divider { height: 2px; background: linear-gradient(to right, #0d9488, transparent); margin-top: 0.25rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="text-slate-800 py-10 font-sans">
    <main class="print-canvas w-full max-w-[210mm] mx-auto bg-white p-12 shadow-2xl rounded-sm">
        <!-- 头部：个人信息 -->
        <header class="flex justify-between items-end border-b-2 border-brand-800 pb-5 mb-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-wider">{{姓名}}</h1>
                <h2 class="text-xl font-medium text-brand-700 mt-2">{{职位}} / {{经验年限}}</h2>
            </div>
            <div class="text-sm text-slate-600 flex flex-col gap-1.5 items-end">
                <div class="flex items-center gap-2">
                    <span>{{电话}}</span>
                    <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                </div>
                <div class="flex items-center gap-2">
                    <span>{{邮箱}}</span>
                    <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div class="flex items-center gap-2">
                    <span>{{GitHub/LinkedIn}}</span>
                    <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                </div>
            </div>
        </header>

        <!-- 简介 -->
        <section class="mb-6">
            <p class="text-slate-600 text-sm leading-relaxed text-justify">{{个人简介}}</p>
        </section>

        <!-- 双栏布局 -->
        <div class="grid grid-cols-12 gap-8">
            <!-- 左侧主栏 -->
            <div class="col-span-12 md:col-span-8">
                <!-- 工作经验 -->
                <section class="mb-8">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        工作经验
                    </h3>
                    <div class="section-divider"></div>
                    {{工作经验列表}}
                </section>

                <!-- 项目经历 -->
                <section>
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                        项目经历
                    </h3>
                    <div class="section-divider"></div>
                    {{项目经历列表}}
                </section>
            </div>

            <!-- 右侧边栏 -->
            <div class="col-span-12 md:col-span-4 border-l border-slate-200 pl-8">
                <!-- 教育背景 -->
                <section class="mb-8">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        教育背景
                    </h3>
                    <div class="section-divider"></div>
                    {{教育背景}}
                </section>

                <!-- 专业技能 -->
                <section class="mb-8">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
                        技术栈
                    </h3>
                    <div class="section-divider"></div>
                    {{技能列表}}
                </section>

                <!-- 荣誉证书 -->
                <section>
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="text-brand-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                        荣誉与证书
                    </h3>
                    <div class="section-divider"></div>
                    {{荣誉证书}}
                </section>
            </div>
        </div>
    </main>
</body>
</html>
