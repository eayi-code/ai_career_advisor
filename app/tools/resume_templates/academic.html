<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术风格简历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', 'SimSun', serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.8;
        }
        .resume {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 50px 60px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #1a365d;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a365d;
            margin-bottom: 8px;
            letter-spacing: 4px;
        }
        .header .subtitle {
            font-size: 16px;
            color: #4a5568;
            font-style: italic;
        }
        .contact-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
            font-size: 14px;
            color: #4a5568;
        }
        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a365d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e2e8f0;
        }
        .item {
            margin-bottom: 18px;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }
        .item-title {
            font-size: 15px;
            font-weight: 700;
            color: #2d3748;
        }
        .item-date {
            font-size: 13px;
            color: #718096;
            font-style: italic;
        }
        .item-subtitle {
            font-size: 14px;
            color: #4a5568;
            font-style: italic;
            margin-bottom: 6px;
        }
        .item-content {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.8;
        }
        .item-content ul {
            padding-left: 20px;
        }
        .item-content li {
            margin-bottom: 4px;
        }
        .skills-list {
            columns: 2;
            column-gap: 30px;
            font-size: 14px;
            color: #4a5568;
        }
        .skills-list li {
            margin-bottom: 6px;
            list-style-type: disc;
        }
        .highlight {
            color: #c53030;
            font-weight: 600;
        }
        @media print {
            body { background: white; }
            .resume { box-shadow: none; padding: 30px 40px; }
        }
    </style>
</head>
<body>
    <div class="resume">
        <header class="header">
            <h1>{{姓名}}</h1>
            <p class="subtitle">{{职位}} · {{经验年限}}</p>
            <div class="contact-bar">
                <span>{{电话}}</span>
                <span>{{邮箱}}</span>
                <span>{{GitHub/LinkedIn}}</span>
            </div>
        </header>

        <section class="section">
            <h2 class="section-title">个人简介</h2>
            <p style="font-size: 14px; color: #4a5568; text-align: justify;">{{个人简介}}</p>
        </section>

        <section class="section">
            <h2 class="section-title">工作经验</h2>
            {{工作经验列表}}
        </section>

        <section class="section">
            <h2 class="section-title">项目经历</h2>
            {{项目经历列表}}
        </section>

        <section class="section">
            <h2 class="section-title">教育背景</h2>
            {{教育背景}}
        </section>

        <section class="section">
            <h2 class="section-title">专业技能</h2>
            <ul class="skills-list">
                {{技能列表}}
            </ul>
        </section>

        <section class="section">
            <h2 class="section-title">荣誉证书</h2>
            {{荣誉证书}}
        </section>
    </div>
</body>
</html>
