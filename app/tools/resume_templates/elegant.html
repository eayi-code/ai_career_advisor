<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优雅风格简历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'SimSun', serif;
            background: #f5f0eb;
            color: #333;
            line-height: 1.8;
        }
        .resume {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 50px 60px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            border: 1px solid #e0d5c7;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid #d4c5b2;
        }
        .header h1 {
            font-size: 36px;
            font-weight: 400;
            color: #2c2c2c;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }
        .header .subtitle {
            font-size: 16px;
            color: #8b7355;
            font-style: italic;
            font-weight: 300;
        }
        .contact-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 400;
            color: #8b7355;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }
        .section-title::before,
        .section-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: #d4c5b2;
        }
        .section-title::before {
            left: 0;
        }
        .section-title::after {
            right: 0;
        }
        .item {
            margin-bottom: 25px;
            text-align: center;
        }
        .item-header {
            margin-bottom: 8px;
        }
        .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c2c2c;
            margin-bottom: 4px;
        }
        .item-date {
            font-size: 13px;
            color: #999;
            font-style: italic;
        }
        .item-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .item-content {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }
        .item-content ul {
            padding-left: 20px;
            text-align: left;
        }
        .item-content li {
            margin-bottom: 6px;
        }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .skill-tag {
            background: #f5f0eb;
            color: #8b7355;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #d4c5b2;
        }
        .highlight {
            color: #c0392b;
            font-weight: 600;
        }
        @media print {
            body { background: white; }
            .resume { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>
    <div class="resume">
        <header class="header">
            <h1>{{姓名}}</h1>
            <p class="subtitle">{{职位}} · {{经验年限}}</p>
            <div class="contact-bar">
                <span class="contact-item">{{电话}}</span>
                <span class="contact-item">{{邮箱}}</span>
                <span class="contact-item">{{GitHub/LinkedIn}}</span>
            </div>
        </header>

        <section class="section">
            <h2 class="section-title">个人简介</h2>
            <p style="font-size: 15px; color: #555; text-align: center; max-width: 600px; margin: 0 auto;">{{个人简介}}</p>
        </section>

        <section class="section">
            <h2 class="section-title">工作经验</h2>
            {{工作经验列表}}
        </section>

        <section class="section">
            <h2 class="section-title">项目经历</h2>
            {{项目经历列表}}
        </section>

        <section class="section">
            <h2 class="section-title">教育背景</h2>
            {{教育背景}}
        </section>

        <section class="section">
            <h2 class="section-title">专业技能</h2>
            <div class="skills-container">
                {{技能列表}}
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">荣誉证书</h2>
            {{荣誉证书}}
        </section>
    </div>
</body>
</html>
