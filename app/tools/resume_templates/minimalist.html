<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简洁商务简历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', 'Arial', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .resume {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 1000px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .sidebar {
            background: #2c3e50;
            color: white;
            padding: 40px 25px;
        }
        .main-content {
            padding: 40px 35px;
        }
        .profile-section {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .profile-section h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .profile-section .subtitle {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 300;
        }
        .sidebar-section {
            margin-bottom: 30px;
        }
        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #3498db;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            opacity: 0.9;
        }
        .contact-icon {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }
        .skill-item {
            margin-bottom: 12px;
        }
        .skill-name {
            font-size: 13px;
            margin-bottom: 4px;
        }
        .skill-bar {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .skill-progress {
            height: 100%;
            background: #3498db;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3498db;
        }
        .item {
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 3px solid #e0e0e0;
        }
        .item:hover {
            border-left-color: #3498db;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }
        .item-title {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
        }
        .item-date {
            font-size: 12px;
            color: #95a5a6;
        }
        .item-subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }
        .item-content {
            font-size: 13px;
            color: #555;
            line-height: 1.7;
        }
        .item-content ul {
            padding-left: 16px;
        }
        .item-content li {
            margin-bottom: 4px;
        }
        .highlight {
            color: #e74c3c;
            font-weight: 600;
        }
        @media print {
            body { background: white; }
            .resume { box-shadow: none; }
            .sidebar { background: #2c3e50 !important; -webkit-print-color-adjust: exact; }
        }
        @media (max-width: 768px) {
            .resume {
                grid-template-columns: 1fr;
            }
            .sidebar {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="resume">
        <aside class="sidebar">
            <div class="profile-section">
                <h1>{{姓名}}</h1>
                <p class="subtitle">{{职位}}</p>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title">联系方式</h3>
                <div class="contact-item">
                    <span>{{电话}}</span>
                </div>
                <div class="contact-item">
                    <span>{{邮箱}}</span>
                </div>
                <div class="contact-item">
                    <span>{{GitHub/LinkedIn}}</span>
                </div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title">教育背景</h3>
                {{教育背景}}
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title">专业技能</h3>
                {{技能列表}}
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title">荣誉证书</h3>
                {{荣誉证书}}
            </div>
        </aside>

        <main class="main-content">
            <section class="section">
                <h2 class="section-title">个人简介</h2>
                <p style="font-size: 14px; color: #555; line-height: 1.8;">{{个人简介}}</p>
            </section>

            <section class="section">
                <h2 class="section-title">工作经验</h2>
                {{工作经验列表}}
            </section>

            <section class="section">
                <h2 class="section-title">项目经历</h2>
                {{项目经历列表}}
            </section>
        </main>
    </div>
</body>
</html>
