<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技风格简历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .resume {
            width: 100%;
            max-width: 800px;
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        .header .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            position: relative;
            z-index: 1;
        }
        .contact-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            position: relative;
            z-index: 1;
        }
        .contact-item {
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .content {
            padding: 30px 40px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '>';
            color: #8b5cf6;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }
        .item {
            margin-bottom: 20px;
            padding: 18px;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .item:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .item-date {
            font-size: 12px;
            color: #64748b;
            background: #1e293b;
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .item-subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .item-content {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.8;
        }
        .item-content ul {
            padding-left: 18px;
        }
        .item-content li {
            margin-bottom: 6px;
        }
        .item-content li::marker {
            color: #3b82f6;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .skill-item {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #e2e8f0;
            text-align: center;
            transition: all 0.3s ease;
        }
        .skill-item:hover {
            border-color: #3b82f6;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
        }
        .highlight {
            color: #fbbf24;
            font-weight: 600;
        }
        @media print {
            body { background: white; padding: 0; }
            .resume { box-shadow: none; border-radius: 0; background: white; color: #333; }
            .header { background: #3b82f6 !important; -webkit-print-color-adjust: exact; }
            .item { background: #f8fafc; border-color: #e2e8f0; }
            .item-title { color: #1e293b; }
            .item-content { color: #475569; }
            .skill-item { background: #f1f5f9; border-color: #e2e8f0; color: #334155; }
        }
    </style>
</head>
<body>
    <div class="resume">
        <header class="header">
            <h1>{{姓名}}</h1>
            <p class="subtitle">{{职位}} · {{经验年限}}</p>
            <div class="contact-bar">
                <span class="contact-item">{{电话}}</span>
                <span class="contact-item">{{邮箱}}</span>
                <span class="contact-item">{{GitHub/LinkedIn}}</span>
            </div>
        </header>

        <div class="content">
            <section class="section">
                <h2 class="section-title">个人简介</h2>
                <p style="font-size: 14px; color: #94a3b8; line-height: 1.8;">{{个人简介}}</p>
            </section>

            <section class="section">
                <h2 class="section-title">工作经验</h2>
                {{工作经验列表}}
            </section>

            <section class="section">
                <h2 class="section-title">项目经历</h2>
                {{项目经历列表}}
            </section>

            <section class="section">
                <h2 class="section-title">教育背景</h2>
                {{教育背景}}
            </section>

            <section class="section">
                <h2 class="section-title">专业技能</h2>
                <div class="skills-grid">
                    {{技能列表}}
                </div>
            </section>

            <section class="section">
                <h2 class="section-title">荣誉证书</h2>
                {{荣誉证书}}
            </section>
        </div>
    </div>
</body>
</html>
