<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历模板 - 侧边栏版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans SC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e5e7eb; -webkit-font-smoothing: antialiased; }
        .a4-canvas { width: 210mm; min-height: 297mm; margin: 2rem auto; background: white; box-sizing: border-box; display: flex; }
        @media print {
            @page { size: A4; margin: 0; }
            body { background-color: white; margin: 0; padding: 0; }
            .a4-canvas { margin: 0 !important; box-shadow: none !important; width: 210mm; min-height: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 font-sans">
    <main class="a4-canvas shadow-2xl overflow-hidden">
        <!-- 左侧深色侧边栏 -->
        <aside class="w-[32%] bg-slate-800 text-slate-200 p-8 flex flex-col gap-8">
            <div class="mt-4">
                <h1 class="text-4xl font-black text-white tracking-widest mb-1">{{姓名}}</h1>
                <h2 class="text-sm font-medium text-slate-400">{{职位}}</h2>
            </div>

            <section>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-600 pb-2 mb-4">联系方式</h3>
                <ul class="text-sm space-y-3">
                    <li class="flex items-center gap-3">
                        <span class="text-lg">📱</span> {{电话}}
                    </li>
                    <li class="flex items-center gap-3">
                        <span class="text-lg">📧</span> {{邮箱}}
                    </li>
                    <li class="flex items-center gap-3">
                        <span class="text-lg">💻</span> {{GitHub/LinkedIn}}
                    </li>
                </ul>
            </section>

            <section>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-600 pb-2 mb-4">教育背景</h3>
                {{教育背景}}
            </section>

            <section>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-600 pb-2 mb-4">专业技能</h3>
                {{技能列表}}
            </section>

            <section class="mt-auto pb-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-600 pb-2 mb-4">荣誉证书</h3>
                {{荣誉证书}}
            </section>
        </aside>

        <!-- 右侧主内容区 -->
        <div class="w-[68%] bg-white p-10 flex flex-col gap-8">
            <section>
                <h3 class="text-lg font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-3">个人简介</h3>
                <p class="text-sm text-slate-600 leading-relaxed text-justify">{{个人简介}}</p>
            </section>

            <section>
                <h3 class="text-lg font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-4">工作经验</h3>
                {{工作经验列表}}
            </section>

            <section>
                <h3 class="text-lg font-bold text-slate-800 border-b-2 border-slate-200 pb-2 mb-4">项目经历</h3>
                {{项目经历列表}}
            </section>
        </div>
    </main>
</body>
</html>
